<script>
    // sort() sorts the array alphabetically
    // reverse() reverses the items in the array in reverse order
    // Shift() deletes and returns the 1st item in tha array
    // pop() deletes and return the last item in the array
    // push (value) add the value at the end of the array,multiple values separated by comas (,)
    // includes(value) checks whether the array contains the given value
    // array.splice(1,0,"new") add or delete in this order (start,count of delete,new value)
    // array.slice() make a copy of that array

    const arr = [];
    arr[0] = 1;
    arr[1] = 2;
    arr[2] = 3;
    arr[3] = 4;
    arr[4] = 5;
    console.log(arr);
    const arr2 = [1, 20, 3, 40, 60, 6, 7, 2];

        console.log(frenz[i]);
    }
    console.log(frenz);

    console.log(arr2.reverse());
    console.log(arr2.includes(89));

    console.log(arr2);
    arr2.splice(1,0,33,55);

    const arr3 = arr2.slice();
    console.log(arr3);
