<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Terminal Escape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <div class="max-w-5xl mx-auto p-8">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-bold text-emerald-400">🏆 Global Leaderboard</h1>
            <a href="index.html" class="bg-gray-800 hover:bg-gray-700 px-8 py-4 rounded-2xl transition">← Back to Home</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-900 rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-6 text-emerald-400">🌱 Best CO₂ Efficiency</h2>
                <div id="co2Leaderboard" class="space-y-4"></div>
            </div>

            <div class="bg-gray-900 rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-6 text-emerald-400">⚡ Fastest Escape (Speed)</h2>
                <div id="speedLeaderboard" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        async function loadLeaderboards() {
            const res = await fetch('/api/player/leaderboard');
            const data = await res.json();

            if (data.success) {
                // CO2 Leaderboard
                let html = data.co2_leaderboard.map((item, i) => `
                    <div class="flex justify-between bg-gray-800 p-5 rounded-2xl">
                        <div class="flex items-center gap-4">
                            <span class="text-3xl font-bold text-emerald-400">${i+1}</span>
                            <div>${item.player_name}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold">${item.co2_used} CO₂</div>
                            <div class="text-xs text-gray-400">${item.rounds} rounds</div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('co2Leaderboard').innerHTML = html || '<p class="text-gray-400">No wins recorded yet</p>';

                // Speed Leaderboard
                html = data.speed_leaderboard.map((item, i) => `
                    <div class="flex justify-between bg-gray-800 p-5 rounded-2xl">
                        <div class="flex items-center gap-4">
                            <span class="text-3xl font-bold text-emerald-400">${i+1}</span>
                            <div>${item.player_name}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold">${item.rounds} rounds</div>
                            <div class="text-xs text-gray-400">${item.co2_used} CO₂</div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('speedLeaderboard').innerHTML = html || '<p class="text-gray-400">No wins recorded yet</p>';
            }
        }
        window.onload = loadLeaderboards;
    </script>
</body>
</html>
