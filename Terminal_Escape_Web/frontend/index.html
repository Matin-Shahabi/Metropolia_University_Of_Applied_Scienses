<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terminal Escape</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes floatPlane {
    0% { transform: translateX(-100px) translateY(0px); opacity: 0; }
    50% { opacity: 0.15; }
    100% { transform: translateX(110vw) translateY(-40px); opacity: 0; }
}

.plane {
    position: absolute;
    font-size: 4rem;
    animation: floatPlane 12s linear infinite;
}
</style>

</head>

<body class="bg-black text-white overflow-hidden h-screen flex items-center justify-center">

<!-- ✈️ animated background planes -->
<div class="plane" style="top:10%">✈️</div>
<div class="plane" style="top:30%; animation-delay:3s;">✈️</div>
<div class="plane" style="top:60%; animation-delay:6s;">✈️</div>

<!-- fog overlay -->
<div class="absolute inset-0 bg-gradient-to-b from-black via-gray-900 to-black opacity-70"></div>

<!-- main UI -->
<div class="relative z-10 text-center w-full max-w-md">

    <!-- logo -->
    <div class="mb-6">
        <div class="text-6xl animate-bounce">✈️</div>
        <h1 class="text-5xl font-bold text-emerald-400 tracking-widest">
            TERMINAL ESCAPE
        </h1>
        <p class="text-gray-400 mt-2">Mankind vs AI Surveillance System</p>
    </div>

    <!-- input -->
    <input id="name"
        placeholder="Enter your pilot name"
        class="w-full px-6 py-4 bg-gray-900 border border-gray-700 rounded-2xl text-center text-lg focus:outline-none focus:border-emerald-500">

    <!-- button -->
    <button onclick="login()"
        class="mt-6 w-full bg-emerald-600 hover:bg-emerald-700 transition px-6 py-4 rounded-2xl text-xl font-bold shadow-lg">
        START MISSION
    </button>

    <p id="err" class="text-red-400 mt-4"></p>

</div>

<script>
async function login(){
    const name = document.getElementById('name').value.trim();

    if(!name){
        document.getElementById('err').innerText = "Enter your name!";
        return;
    }

    const res = await fetch('/api/auth/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({player_name:name})
    });

    const data = await res.json();

    if(data.success){
        localStorage.setItem('player', JSON.stringify(data.player));

        // ✨ little cinematic transition
        document.body.style.transition = "all 0.5s";
        document.body.style.opacity = "0";

        setTimeout(()=>{
            window.location.href = "menu.html";
        },500);

    } else {
        document.getElementById('err').innerText = data.error;
    }
}
</script>

</body>
</html>
